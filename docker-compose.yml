services:
  redis:
    image: redis:7-alpine
    container_name: codezen-redis

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codezen-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      REDIS_URL: redis://redis:6379/0
      SANDBOX_IMAGE: codezen-sandbox:latest
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codezen-worker
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      REDIS_URL: redis://redis:6379/0
      SANDBOX_IMAGE: codezen-sandbox:latest
    depends_on:
      - redis
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock
